<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Γεντίκης Λεωνίδας</title>
    <meta name="description" content="{% block description %}Εξειδικευμένες υδραυλικές υπηρεσίες στην Κηφισιά από το 1999.{% endblock %}">

    <link rel="canonical" href="https://www.gentikis.gr{{ request.path }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>
<body>
  <header class="main-header">
    <div class="image-wrapper">
      <a href="{{ url_for('index') }}">

    </div>

    <nav class="tab-menu">
      <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">Αρχική</a>
      <a href="{{ url_for('company') }}" class="{{ 'active' if request.endpoint == 'company' }}">Η Επιχείρησή μας</a>
      <a href="{{ url_for('services') }}" class="{{ 'active' if request.endpoint == 'services' }}">Υπηρεσίες</a>
      <a href="{{ url_for('contact') }}" class="{{ 'active' if request.endpoint == 'contact' }}">Επικοινωνία</a>
    </nav>

  <main class="container">
